services:

  redis:
    image: redis/redis-stack:latest
    container_name: jobscope_redis_stack
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - jobscope_redis:/data


  rabbitmq:
    image: rabbitmq:3-management
    container_name: jobscope_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password

  postgres:
    image: pgvector/pgvector:pg16
    container_name: jobscope_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jobscopedb
    volumes:
      - jobscope_postgres:/var/lib/postgresql/data

volumes:
  jobscope_redis:
  jobscope_postgres:


